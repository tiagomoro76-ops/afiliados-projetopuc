name: CI/CD Pipeline

on:
  pull_request:
    branches: [ dev ]   # CI roda no dev
  push:
    branches: [ main ]  # CD roda no main

jobs:
  build:
    name: Build / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest --maxfail=1 --disable-warnings -q

  deploy:
    name: Deploy
    needs: build         # ⚡ Isso faz a caixa do deploy depender do build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Simulate Deployment
        run: echo "Deploy realizado com sucesso!"
