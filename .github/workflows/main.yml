name: CI/CD Pipeline

# Quando o workflow deve rodar
on:
  pull_request:
    branches: [ dev ]   # CI roda ao criar PR no dev

  push:
    branches: [ main ]  # CD roda quando houver push no main

jobs:
  build:
    name: Build / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Atualizar pip e instalar pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Rodar testes unitários
        run: |
          pytest

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Simular Deployment
        run: |
          echo "Deploy iniciado..."
          echo "Deploy do Mini Shopee concluído com sucesso!"
